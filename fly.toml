# fly.toml app configuration file generated for fullstackopen-osa3-xi76xw on 2026-04-19T11:49:08Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'fullstackopen-osa3-xi76xw'
primary_region = 'ams'

[build]

[env]
  PORT = "3001"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.checks]
    [http_service.checks.health]
      interval = "10s"
      timeout = "2s"
      grace_period = "5s"
      method = "GET"
      path = "/health"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
